name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Garantir Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Mostrar versões
        run: |
          docker --version
          docker compose version
          php --version

      - name: Validar sintaxe de todos os arquivos PHP
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Build da aplicação
        run: docker compose build

      - name: Subir containers
        run: docker compose up -d

      - name: Aguardar aplicação
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:1010/ > /dev/null; then
              echo "Aplicação respondeu com sucesso."
              exit 0
            fi
            echo "Aguardando aplicação..."
            sleep 3
          done
          echo "Aplicação não respondeu a tempo."
          docker compose logs
          exit 1

      - name: Testar rota inicial
        run: curl -i http://localhost:1010/

      - name: Testar rota de episódio
        run: curl -i http://localhost:1010/episode/naruto/1/1 || true

      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs

      - name: Derrubar containers
        if: always()
        run: docker compose down -v