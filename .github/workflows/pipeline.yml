name: SUGOIAPI Pipeline

on:
  schedule:
    # A cada 2 horas. Ajuste se quiser mais/menos frequente.
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write   # necessário para commit do state e da playlist

concurrency:
  group: sugoiapi-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUTIO_TOKEN: ${{ secrets.PUTIO_TOKEN }}
      SENTRY_DSN:  ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Fase A — RSS → Put.io (envia magnets novos) ────────────────────
      - name: Enqueue magnets no Put.io
        if: env.PUTIO_TOKEN != ''
        run: python rss_to_putio.py

      # ── Fase B — Put.io → state (resolve URLs prontas) ─────────────────
      - name: Harvest stream URLs do Put.io
        if: env.PUTIO_TOKEN != ''
        run: python harvest_putio.py

      # ── Pipeline principal — consome state + gera playlist ─────────────
      - name: Pipeline (gera playlist_validada.m3u)
        run: python pipeline.py

      # ── Commit dos artefatos persistentes ──────────────────────────────
      - name: Commit & push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Adiciona apenas o que faz sentido versionar:
          # - putio_state.json: idempotência entre runs
          # - putio_entries.m3u: fragmento Put.io (debug)
          # - output/playlist_validada.m3u: playlist final
          git add putio_state.json putio_entries.m3u output/playlist_validada.m3u 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "auto: pipeline run $(date -u +%FT%TZ)"
            git push
          fi
