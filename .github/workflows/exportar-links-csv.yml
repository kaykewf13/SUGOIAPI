name: Exportar Links via CSV

on:
  workflow_dispatch:
  push:
    paths:
      - "consultas.csv"
      - "exportar_links_api_v3.py"
      - ".github/workflows/exportar-links-csv.yml"

permissions:
  contents: write

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Garantir pasta output
        run: mkdir -p output

      - name: Executar script com CSV
        run: |
          python exportar_links_api_v3.py --csv consultas.csv --output-name "catalogo_csv"

      - name: Commit e push dos resultados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add output/
          git commit -m "Atualiza resultados automáticos via CSV" || echo "Sem alterações para commit"
          git push