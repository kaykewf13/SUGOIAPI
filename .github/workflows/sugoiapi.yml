name: Executar SUGOIAPI VOD

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Executa automaticamente todo dia à meia-noite

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências Necessárias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Executar Script Principal
        run: python kaykewf13/SUGOIAPI/exportar_links_api_v3.py

      - name: Salvar Resultados (Artifacts)
        uses: actions/upload-artifact@v3
        with:
          name: relatorios-vod
          path: kaykewf13/SUGOIAPI/output/
