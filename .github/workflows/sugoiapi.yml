name: Executar SUGOIAPI VOD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: python exportar_links_api_v3.py

      - name: Commit e push dos resultados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Adiciona os arquivos da pasta output
          git add output/
          
          # Tenta fazer o commit; se não houver mudanças, apenas avisa
          if git commit -m "Auto-update: Links capturados [$(date +'%Y-%m-%d %H:%M')]"; then
            # O SEGREDO ESTÁ AQUI: Sincroniza antes de enviar
            git pull --rebase origin main
            git push origin main
          else
            echo "Nada para atualizar."
          fi
