name: Executar SUGOIAPI VOD e Gravar Resultados

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite (UTC)
  workflow_dispatch: # Permite execução manual pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão crucial para gravar ficheiros no repositório

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Listar Estrutura de Pastas (Debug)
        run: ls -R

      - name: Executar Script Principal
        run: |
          # Procura o ficheiro dinamicamente para evitar erro de caminho
          SCRIPT_PATH=$(find . -name "exportar_links_api_v3.py" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ Erro: Ficheiro exportar_links_api_v3.py não encontrado no repositório!"
            exit 1
          fi
          python "$SCRIPT_PATH"

      - name: Commitar e Fazer Push dos Resultados
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Procura a pasta output onde quer que ela tenha sido criada
          OUTPUT_DIR=$(find . -type d -name "output" | head -n 1)
          
          if [ -n "$OUTPUT_DIR" ]; then
            git add "$OUTPUT_DIR"/*.csv || echo "Sem CSV"
            git add "$OUTPUT_DIR"/*.xlsx || echo "Sem XLSX"
            git add "$OUTPUT_DIR"/*.m3u || echo "Sem M3U"
            
            # Só faz commit se houver alterações reais
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Auto-update: Relatórios e Playlist [$(date +'%Y-%m-%d %H:%M')]"
              git push
            else
              echo "Nada de novo para commitar."
            fi
          else
            echo "❌ Erro: Pasta output não foi gerada pelo script Python."
            exit 1
          fi
