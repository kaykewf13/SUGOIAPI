name: Executar SUGOIAPI VOD

on:
  workflow_dispatch:      # Permite rodar manualmente
  schedule:
    - cron: '0 3 * * *'  # Isso faz o robô rodar todos os dias às 03:00 AM (UTC)
  push:
    branches:
      - main


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: python exportar_links_api_v3.py

      - name: 5. Commit e push dos resultados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Garante que o robô veja as mudanças remotas
          git fetch origin main
          
          git add output/
          
          if git commit -m "Auto-update: Links [$(date +'%d-%m %H:%M')]"; then
            # Tenta sincronizar. Se houver conflito, o robô prioriza o que ele acabou de gerar
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "Sem alterações."
          fi
