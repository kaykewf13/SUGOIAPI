name: Executar SUGOIAPI VOD

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

       steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Força a instalação das bibliotecas necessárias
          pip install pandas openpyxl requests

      - name: 4. Executar Script
        # Remova os argumentos --csv se o seu script atual não estiver preparado para recebê-los
        run: python exportar_links_api_v3.py

      - name: 5. Gravar resultados no GitHub (Auto-Commit)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Adiciona a pasta output inteira, independente da extensão
          git add output/ || echo "Pasta output não encontrada"
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: Relatórios [$(date +'%Y-%m-%d %H:%M')]"
            git push
          else
            echo "Nada para atualizar."
          fi
