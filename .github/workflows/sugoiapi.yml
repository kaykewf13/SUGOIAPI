name: Executar SUGOIAPI VOD

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Baixar Código do Repositório
        uses: actions/checkout@v3

      - name: 2. Configurar ambiente Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. INSTALAR BIBLIOTECAS (O ajuste principal)
        run: |
          python -m pip install --upgrade pip
          # Instala tudo o que o seu script precisa
          pip install pandas openpyxl requests

      - name: 4. Executar Script Python
        run: python exportar_links_api_v3.py

      - name: 5. Gravar resultados no GitHub (Auto-Commit)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Adiciona os arquivos gerados na pasta output
          git add **/output/*.csv || echo "Sem CSV"
          git add **/output/*.xlsx || echo "Sem XLSX"
          git add **/output/*.m3u || echo "Sem M3U"
          
          # Só faz o commit se houver mudanças
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: Relatórios [$(date +'%Y-%m-%d %H:%M')]"
            git push
          else
            echo "Nada para atualizar."
          fi
