name: Executar SUGOIAPI VOD e Gravar Resultados

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite (UTC)
  workflow_dispatch: # Permite que execute manualmente pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para permitir que o GitHub grave ficheiros no repo

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Executar Script Principal
        run: python kaykewf13/SUGOIAPI/exportar_links_api_v3.py

      - name: Commitar e Fazer Push dos Resultados
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add kaykewf13/SUGOIAPI/output/*.csv
          git add kaykewf13/SUGOIAPI/output/*.xlsx
          git add kaykewf13/SUGOIAPI/output/*.m3u
          git commit -m "Auto-update: Relatórios e Playlist [$(date +'%Y-%m-%d %H:%M')]" || exit 0
          git push
