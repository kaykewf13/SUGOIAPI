import sys
import logging
import traceback
from pathlib import Path

# ... (seus outros imports: requests, pandas, etc)

# 1. Configuração Robusta de Diretórios
SCRIPT_DIR = Path(__file__).parent.absolute()
OUTPUT_DIR = SCRIPT_DIR / "output"
OUTPUT_DIR.mkdir(parents=True, exist_ok=True)

LOG_FILE = OUTPUT_DIR / "saude_providers.log"

logging.basicConfig(
    filename=str(LOG_FILE),
    level=logging.INFO,
    format='%(asctime)s - %(levelname)s - %(message)s',
    encoding='utf-8'
)

# 2. Execução Protegida
if __name__ == "__main__":
    try:
        print("🚀 Iniciando processamento...")
        # CHAME SUA FUNÇÃO PRINCIPAL AQUI (ex: main())
        # main() 
        print("✅ Script finalizado com sucesso.")
        
    except Exception as e:
        print(f"❌ ERRO CRÍTICO ENCONTRADO: {e}")
        # Isso imprime o rastro do erro no log do GitHub Actions
        traceback.print_exc() 
        logging.error(f"Erro fatal: {traceback.format_exc()}")
        # Encerra com código 1 para o GitHub saber que falhou, 
        # mas agora com uma mensagem clara no console.
        sys.exit(1) 
