name: Gerar Playlist Anime M3U (yt-dlp)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  extract-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 lxml yt-dlp
          yt-dlp --version

      - name: Extrair streams com yt-dlp
        run: python extractor_ytdlp.py
        continue-on-error: true

      - name: Verificar streams.json
        run: |
          if [ ! -f streams.json ]; then
            echo "streams.json não encontrado, criando arquivo vazio"
            echo "[]" > streams.json
          fi
          echo "Streams encontrados: $(python -c "import json; data=json.load(open('streams.json')); print(len(data))")"

      - name: Gerar playlist M3U
        run: python generate_m3u_ytdlp.py

      - name: Commit e push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/ streams.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Playlist atualizada $(date +'%Y-%m-%d %H:%M')"
          git push

      - uses: actions/upload-artifact@v4
        with:
          name: anime-playlist
          path: docs/
          retention-days: 7
