name: Executar SUGOIAPI VOD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanitizar quotes do script
        run: |
          python3 -c "
          with open('exportar_links_api_v3.py', 'rb') as f:
              raw = f.read()
          raw = raw.replace(b'\xe2\x80\x9c', b\"'\")
          raw = raw.replace(b'\xe2\x80\x9d', b\"'\")
          raw = raw.replace(b'\xe2\x80\x98', b\"'\")
          raw = raw.replace(b'\xe2\x80\x99', b\"'\")
          with open('exportar_links_api_v3.py', 'wb') as f:
              f.write(raw)
          print('Sanitizacao OK')
          "

      - name: Executar script
        run: python exportar_links_api_v3.py

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: Links [$(date +'%d-%m %H:%M')]"
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "Sem alteracoes."
          fi
