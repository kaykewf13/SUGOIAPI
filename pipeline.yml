name: SUGOIAPI Pipeline

on:
  schedule:
    # Executa diariamente às 03:00 UTC (meia-noite BRT)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forçar execução mesmo sem mudanças"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  pipeline:
    name: Gerar Playlist M3U
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ───────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependências ─────────────────────────────────────────
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 4. Executar pipeline ─────────────────────────────────────
      - name: Executar pipeline.py
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline.py

      # ── 5. Registrar no proxy ───────────────────────────────────
      - name: Registrar streams no m3u-proxy
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_API_TOKEN: ${{ secrets.PROXY_API_TOKEN }}
        run: |
          if [ -f "register_streams.py" ]; then
            python register_streams.py
          fi

      # ── 6. Verificar saída ──────────────────────────────────────
      - name: Verificar playlist gerada
        run: |
          if [ ! -f "output/playlist_validada.m3u" ]; then
            echo "❌ Playlist não gerada — abortando commit"
            exit 1
          fi

          TOTAL=$(grep -c "^#EXTINF" output/playlist_validada.m3u || echo 0)
          CANAIS=$(grep -c "group-title=\"Canais" output/playlist_validada.m3u || echo 0)
          SERIES=$(grep -c "group-title=\"Series" output/playlist_validada.m3u || echo 0)
          FILMES=$(grep -c "group-title=\"Filmes" output/playlist_validada.m3u || echo 0)

          echo "📋 Resumo da playlist:"
          echo "  Canais  → $CANAIS"
          echo "  Séries  → $SERIES"
          echo "  Filmes  → $FILMES"
          echo "  Total   → $TOTAL links reais validados"

          # Falha se playlist estiver vazia
          if [ "$TOTAL" -lt 10 ]; then
            echo "❌ Playlist com menos de 10 entradas — possível falha nas fontes"
            exit 1
          fi

      # ── 7. Gerar relatório de saúde ─────────────────────────────
      - name: Gerar health report
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          TOTAL=$(grep -c "^#EXTINF" output/playlist_validada.m3u || echo 0)
          CANAIS=$(grep -c "group-title=\"Canais" output/playlist_validada.m3u || echo 0)
          SERIES=$(grep -c "group-title=\"Series" output/playlist_validada.m3u || echo 0)
          FILMES=$(grep -c "group-title=\"Filmes" output/playlist_validada.m3u || echo 0)

          cat > output/health.json << EOF
          {
            "updated_at": "$DATE",
            "total": $TOTAL,
            "canais": $CANAIS,
            "series": $SERIES,
            "filmes": $FILMES,
            "status": "ok"
          }
          EOF

          echo "✅ Health report gerado"

      # ── 8. Commit e push ─────────────────────────────────────────
      - name: Commit playlist atualizada
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/playlist_validada.m3u output/health.json

          # Só commita se houver mudanças
          if git diff --cached --quiet; then
            echo "ℹ️  Sem mudanças na playlist — nenhum commit necessário"
          else
            TOTAL=$(grep -c "^#EXTINF" output/playlist_validada.m3u || echo 0)
            git commit -m "🎬 Playlist atualizada — $TOTAL links reais [$(date -u +%Y-%m-%d)]"
            git push
            echo "✅ Playlist publicada no repositório"
          fi

      # ── 9. Notificar Sentry em caso de falha ─────────────────────
      - name: Notificar falha no Sentry
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          python - <<'EOF'
          import os, urllib.request, json, datetime

          dsn = os.getenv("SENTRY_DSN", "")
          if not dsn:
              print("SENTRY_DSN não configurado — pulando notificação")
              exit(0)

          payload = json.dumps({
              "exception": {
                  "values": [{
                      "type": "PipelineFailure",
                      "value": "Pipeline SUGOIAPI falhou — verificar logs do Actions",
                  }]
              },
              "level": "error",
              "tags": {
                  "pipeline": "sugoiapi",
                  "run_date": datetime.date.today().isoformat()
              }
          }).encode()

          # Extrai DSN para montar a URL da API Sentry
          import re
          m = re.match(r'https://([^@]+)@([^/]+)/(\d+)', dsn)
          if m:
              key, host, pid = m.groups()
              url = f"https://{host}/api/{pid}/store/"
              req = urllib.request.Request(
                  url, data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "X-Sentry-Auth": f"Sentry sentry_version=7, sentry_key={key}"
                  }
              )
              try:
                  urllib.request.urlopen(req, timeout=10)
                  print("✅ Falha reportada ao Sentry")
              except Exception as e:
                  print(f"Sentry indisponível: {e}")
          EOF
